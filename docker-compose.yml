services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-postgres
    environment:
      POSTGRES_DB: ticket_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticket_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticket-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./ticket-web-app/backend
    container_name: ticket-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ticket_app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"

  validation-service:
    build:
      context: ./validation-gate/validation-service
    container_name: validation-service
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      VALIDATION_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ticket_app
      VALIDATION_DATASOURCE_USERNAME: postgres
      VALIDATION_DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      LEVEL4_BASE_URL: ${LEVEL4_BASE_URL:-}
      LEVEL4_SCAN_RECORD_BATCH_PATH: ${LEVEL4_SCAN_RECORD_BATCH_PATH:-/scan-record/batch}
      LEVEL4_MOCK_ENABLED: ${LEVEL4_MOCK_ENABLED:-true}
      VALIDATION_SERVICE_PORT: 8081
      VALIDATION_ALLOWED_ORIGINS: ${VALIDATION_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4173}
    ports:
      - "8081:8081"

volumes:
  postgres-data:
  redis-data:
