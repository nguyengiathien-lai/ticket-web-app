spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        generate_statistics: true

logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  seed:
    demo-accounts:
      enabled: ${APP_SEED_DEMO_ACCOUNTS_ENABLED:true}
