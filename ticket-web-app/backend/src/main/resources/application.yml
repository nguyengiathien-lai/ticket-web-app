spring:
  application:
    name: ticket-backend

  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties]
    
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticket_app}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      repositories:
        enabled: false
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        debug: ${MAIL_DEBUG:false}
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
            protocols: TLSv1.2
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:10000}
          timeout: ${MAIL_TIMEOUT:10000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:10000}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.ticketapp: DEBUG


app:
  otp:
    email-verification-ttl: ${EMAIL_VERIFICATION_OTP_TTL:2m}
  cors:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    allowed-origin-patterns: ${APP_ALLOWED_ORIGIN_PATTERNS:}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    from-name: ${MAIL_FROM_NAME:Ticket App}
    brevo-api-key: ${BREVO_API_KEY:}
  jwt:
    secret: ${JWT_SECRET:change-this-local-dev-secret-that-is-at-least-32-bytes}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  level5:
    base-url: ${LEVEL5_BASE_URL:http://localhost:8082}
    ticket-purchase-path: ${LEVEL5_TICKET_PURCHASE_PATH:/api/tickets/purchase}
    single-trip-ticket-purchase-path: ${LEVEL5_SINGLE_TRIP_TICKET_PURCHASE_PATH:/api/tickets/single-trip}
    pass-ticket-purchase-path: ${LEVEL5_PASS_TICKET_PURCHASE_PATH:/api/tickets/pass}
    card-purchase-path: ${LEVEL5_CARD_PURCHASE_PATH:/api/cards/purchase}
    passenger-stations-path: ${LEVEL5_PASSENGER_STATIONS_PATH:/api/passenger/stations}
    passenger-routes-path: ${LEVEL5_PASSENGER_ROUTES_PATH:/api/passenger/routes}
    passenger-cards-path: ${LEVEL5_PASSENGER_CARDS_PATH:/api/passengers/{userId}/cards}
    passenger-tickets-path: ${LEVEL5_PASSENGER_TICKETS_PATH:/api/passengers/{userId}/tickets}
    passenger-trips-path: ${LEVEL5_PASSENGER_TRIPS_PATH:/api/passengers/{userId}/trips}
    fare-prices-path: ${LEVEL5_FARE_PRICES_PATH:/api/passenger/fare/prices}
    fare-discounts-path: ${LEVEL5_FARE_DISCOUNTS_PATH:/api/passenger/fare/discounts}
    mock-enabled: ${LEVEL5_MOCK_ENABLED:false}
  cache:
    passenger-data-ttl-seconds: ${APP_CACHE_PASSENGER_DATA_TTL_SECONDS:${CATALOG_REFRESH_TTL_SECONDS:600}}
    catalog-refresh-ttl-seconds: ${CATALOG_REFRESH_TTL_SECONDS:600}
  level4:
    base-url: ${LEVEL4_BASE_URL:}
    qr-code-path: ${LEVEL4_QR_CODE_PATH:/vdt/generate-dynamic-qr}
    mock-enabled: ${LEVEL4_MOCK_ENABLED:true}
  seed:
    demo-accounts:
      enabled: ${APP_SEED_DEMO_ACCOUNTS_ENABLED:false}
      password: ${APP_SEED_DEMO_ACCOUNTS_PASSWORD:12345678}
