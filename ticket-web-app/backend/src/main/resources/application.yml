spring:
  application:
    name: ticket-backend

  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties]
    
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticket_app}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      repositories:
        enabled: false
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
  
  profiles:
    active: dev

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.ticketapp: DEBUG


app:
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  jwt:
    secret: ${JWT_SECRET:change-this-local-dev-secret-that-is-at-least-32-bytes}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  level5:
    base-url: ${LEVEL5_BASE_URL:http://localhost:8082}
    ticket-purchase-path: ${LEVEL5_TICKET_PURCHASE_PATH:/api/tickets/purchase}
    card-purchase-path: ${LEVEL5_CARD_PURCHASE_PATH:/api/cards/purchase}
    passenger-stations-path: ${LEVEL5_PASSENGER_STATIONS_PATH:/api/passenger/stations}
    passenger-routes-path: ${LEVEL5_PASSENGER_ROUTES_PATH:/api/passenger/routes}
    passenger-cards-path: ${LEVEL5_PASSENGER_CARDS_PATH:/api/passengers/{userId}/cards}
    passenger-tickets-path: ${LEVEL5_PASSENGER_TICKETS_PATH:/api/passengers/{userId}/tickets}
    passenger-trips-path: ${LEVEL5_PASSENGER_TRIPS_PATH:/api/passengers/{userId}/trips}
    fare-prices-path: ${LEVEL5_FARE_PRICES_PATH:/api/passenger/fare/prices}
    fare-discounts-path: ${LEVEL5_FARE_DISCOUNTS_PATH:/api/passenger/fare/discounts}
    mock-enabled: ${LEVEL5_MOCK_ENABLED:false}
  cache:
    catalog-refresh-ttl-seconds: ${CATALOG_REFRESH_TTL_SECONDS:600}
  level4:
    base-url: ${LEVEL4_BASE_URL:}
    qr-code-path: ${LEVEL4_QR_CODE_PATH:/vdt/generate-dynamic-qr}
    mock-enabled: ${LEVEL4_MOCK_ENABLED:true}
