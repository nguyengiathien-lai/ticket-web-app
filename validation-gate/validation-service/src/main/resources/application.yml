spring:
  application:
    name: validation-service

  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties]

  datasource:
    url: ${VALIDATION_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/validation-gate;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}}
    username: ${VALIDATION_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
    password: ${VALIDATION_DB_PASSWORD:${DB_PASSWORD:}}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${VALIDATION_SERVICE_PORT:8081}
  servlet:
    context-path: /api

app:
  device:
    code: ${DEVICE_CODE:gate-device-1}
    secret: ${DEVICE_SECRET:}
    station-code: ${DEVICE_STATION_CODE:station-1}
  rabbitmq:
    device-package-exchange: ${DEVICE_PACKAGE_EXCHANGE:level4.device.packages}
  cors:
    allowed-origins: ${VALIDATION_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  level4:
    base-url: ${LEVEL4_BASE_URL:http://localhost:8082}
    scan-record-batch-path: ${LEVEL4_SCAN_RECORD_BATCH_PATH:${LEVEL4_SCAN_RECORD_PATH:/vdt/transaction/submit-batch}}
    scan-record-batch-size: ${LEVEL4_SCAN_RECORD_BATCH_SIZE:100}
    scan-record-flush-delay-ms: ${LEVEL4_SCAN_RECORD_FLUSH_DELAY_MS:30000}
    sent-event-retention: ${LEVEL4_SENT_EVENT_RETENTION:7d}
    sent-event-cleanup-delay-ms: ${LEVEL4_SENT_EVENT_CLEANUP_DELAY_MS:3600000}
    qr-verification-key: ${LEVEL4_QR_VERIFICATION_KEY:}
    max-clock-drift-seconds: ${LEVEL4_QR_MAX_CLOCK_DRIFT_SECONDS:60}
    mock-enabled: ${LEVEL4_MOCK_ENABLED:false}
